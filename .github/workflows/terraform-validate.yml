#########################################################
# Workflow Name:
# Terraform Validate
#
# Purpose:
# This workflow validates Terraform syntax and configuration quality before merge.
# It helps detect structural issues early and keeps infrastructure changes reviewable.
#
# Trigger:
# pull_request
#
# When It Runs:
# Runs for pull requests targeting main when Terraform-related files change.
#
# Expected Outcome:
# Terraform formatting and validation checks complete successfully for discovered modules.
#
# Failure Impact:
# Invalid Terraform can reach review or merge stages, increasing infrastructure delivery risk.
#
# Owner:
# AiOpsVista Platform Engineering
#
# Related Documentation:
# docs/SDLC_AND_GOVERNANCE.md
#
#########################################################

name: Terraform Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "platform/**"
      - "deployments/**"
      - "**/*.tf"
      - "**/*.tfvars"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: |
          terraform fmt -check -recursive || true

      - name: Terraform init and validate
        run: |
          for d in $(find . -type f -name "*.tf" -printf "%h\n" | sort -u); do
            echo "Validating $d"
            (cd "$d" && terraform init -backend=false -input=false && terraform validate)
          done
