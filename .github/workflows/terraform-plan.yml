#########################################################
# Workflow Name:
# Terraform Plan
#
# Purpose:
# This workflow generates a Terraform execution plan for review before infrastructure changes are merged.
# It provides visibility into intended state transitions and supports safer approvals.
#
# Trigger:
# pull_request
#
# When It Runs:
# Runs for pull requests to main when Terraform-related files are modified.
#
# Expected Outcome:
# A successful plan path confirms proposed infrastructure changes can be evaluated safely.
#
# Failure Impact:
# Missing or failed plan output reduces change transparency and increases deployment uncertainty.
#
# Owner:
# AiOpsVista Platform Engineering
#
# Related Documentation:
# docs/SDLC_AND_GOVERNANCE.md
#
#########################################################

name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "platform/**"
      - "deployments/**"
      - "**/*.tf"
      - "**/*.tfvars"

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init and plan (if root module exists)
        run: |
          if [ -f "main.tf" ]; then
            terraform init -input=false
            terraform plan -input=false -no-color
          else
            echo "No root Terraform module at repository root; skipping plan."
          fi
