#########################################################
# Workflow Name:
# Terraform Security Scan
#
# Purpose:
# This workflow scans Terraform code for misconfigurations and policy violations.
# It strengthens pre-merge security posture through automated infrastructure security checks.
#
# Trigger:
# pull_request
#
# When It Runs:
# Runs on pull requests to main for Terraform file and platform configuration changes.
#
# Expected Outcome:
# Security scanning tools complete and report actionable findings for triage.
#
# Failure Impact:
# Security gaps may be merged without visibility, increasing compliance and operational risk.
#
# Owner:
# AiOpsVista Platform Engineering
#
# Related Documentation:
# docs/SDLC_AND_GOVERNANCE.md
#
#########################################################

name: Terraform Security Scan

on:
  pull_request:
    branches: [main]
    paths:
      - "platform/**"
      - "deployments/**"
      - "**/*.tf"
      - "**/*.tfvars"

permissions:
  contents: read

jobs:
  tfsec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true

  checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          quiet: true
          soft_fail: true
